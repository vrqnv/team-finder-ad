services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: team_finder
      POSTGRES_USER: team_finder
      POSTGRES_PASSWORD: team_finder
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team_finder"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: team_finder
      POSTGRES_USER: team_finder
      POSTGRES_PASSWORD: team_finder